{% extends "base.html" %}

{% block title %}Forgot Password - Educational Content Analysis System{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[calc(100vh-200px)]">
    <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Forgot Password</h2>

        <div id="forgot-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded"></div>
        <div id="forgot-success" class="hidden mb-4 p-3 bg-green-100 text-green-700 rounded"></div>

        <form id="forgot-form" class="space-y-4">
            <div>
                <label for="email" class="block text-gray-700 mb-2">Email</label>
                <input type="email" id="email" name="email" class="w-full p-2 border border-gray-300 rounded" required>
                <p class="text-xs text-gray-500 mt-1">Enter the email address associated with your account</p>
            </div>

            <div class="flex justify-between items-center">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700">
                    Reset Password
                </button>
                <a href="/login" class="text-indigo-600 hover:text-indigo-800">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('forgot-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const errorDiv = document.getElementById('forgot-error');
        const successDiv = document.getElementById('forgot-success');

        // Reset messages
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        try {
            const response = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email
                })
            });

            const data = await response.json();

            if (!response.ok) {
                errorDiv.textContent = data.error || 'Password reset request failed. Please try again.';
                errorDiv.classList.remove('hidden');
                return;
            }

            // If we have a reset URL from Google Auth, redirect to it
            if (data.reset_url) {
                // Show success message before redirecting
                successDiv.textContent = 'Redirecting to Google for authentication...';
                successDiv.classList.remove('hidden');

                // Redirect to Google Auth after a short delay
                setTimeout(() => {
                    window.location.href = data.reset_url;
                }, 1500);
            } else {
                // Show generic success message
                successDiv.textContent = 'Password reset instructions have been sent to your email.';
                successDiv.classList.remove('hidden');

                // Reset form
                document.getElementById('forgot-form').reset();
            }

        } catch (error) {
            console.error('Error:', error);
            errorDiv.textContent = 'An error occurred. Please try again.';
            errorDiv.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
