{% extends "base.html" %}

{% block title %}Reset Password - Educational Content Analysis System{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[calc(100vh-200px)]">
    <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Reset Password</h2>
        
        <div id="reset-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded"></div>
        <div id="reset-success" class="hidden mb-4 p-3 bg-green-100 text-green-700 rounded"></div>
        
        <form id="reset-form" class="space-y-4">
            <input type="hidden" id="token" name="token" value="{{ token }}">
            
            <div>
                <label for="password" class="block text-gray-700 mb-2">New Password</label>
                <input type="password" id="password" name="password" class="w-full p-2 border border-gray-300 rounded" required>
                <p class="text-xs text-gray-500 mt-1">Password must be at least 8 characters long</p>
            </div>
            
            <div>
                <label for="confirm_password" class="block text-gray-700 mb-2">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="w-full p-2 border border-gray-300 rounded" required>
            </div>
            
            <div class="flex justify-between items-center">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700">
                    Reset Password
                </button>
                <a href="/login" class="text-indigo-600 hover:text-indigo-800">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('reset-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const token = document.getElementById('token').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        
        const errorDiv = document.getElementById('reset-error');
        const successDiv = document.getElementById('reset-success');
        
        // Reset messages
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');
        
        // Validate form
        if (password.length < 8) {
            errorDiv.textContent = 'Password must be at least 8 characters long';
            errorDiv.classList.remove('hidden');
            return;
        }
        
        if (password !== confirmPassword) {
            errorDiv.textContent = 'Passwords do not match';
            errorDiv.classList.remove('hidden');
            return;
        }
        
        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    token,
                    password
                })
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                errorDiv.textContent = data.error || 'Password reset failed. Please try again.';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            // Show success message
            successDiv.textContent = 'Password has been reset successfully! Redirecting to login...';
            successDiv.classList.remove('hidden');
            
            // Reset form
            document.getElementById('reset-form').reset();
            
            // Redirect to login page after a delay
            setTimeout(() => {
                window.location.href = '/login';
            }, 2000);
            
        } catch (error) {
            console.error('Error:', error);
            errorDiv.textContent = 'An error occurred. Please try again.';
            errorDiv.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
