<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - E-Shiksha</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <!-- CSS Files -->
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loader Animation -->
    <div class="loader-container">
        <div class="loader"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="../index.html">
                    <h1>E-<span>Shiksha</span></h1>
                </a>
            </div>
            <div class="menu-toggle">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="../index.html#about" class="nav-link">About</a></li>
                <li><a href="../index.html#contact" class="nav-link">Contact Us</a></li>
                <li><a href="login.html" class="nav-link login-btn">Login</a></li>
                <li><a href="signup.html" class="nav-link signup-btn">Sign Up</a></li>
            </ul>
            <div class="theme-toggle">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </nav>

    <!-- Forgot Password Section -->
    <section class="auth-section">
        <div class="auth-container forgot-password-container">
            <div class="auth-form-container">
                <div class="auth-form-header">
                    <h2>Reset Password</h2>
                    <p>Enter your email to receive a password reset link</p>
                </div>
                <form id="forgotPasswordForm" class="auth-form">
                    <div class="form-group">
                        <input type="email" id="email" name="email" placeholder="Your Email" required>
                        <label for="email">Your Email</label>
                        <i class="fas fa-envelope"></i>
                    </div>
                    <button type="submit" class="btn primary-btn auth-btn">
                        <span>Send Reset Link</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
                <div class="auth-redirect">
                    <p>Remember your password? <a href="login.html">Back to Login</a></p>
                </div>
            </div>
            <div class="auth-image">
                <div id="forgot-password-lottie"></div>
                <div class="auth-image-text">
                    <h3>Password Recovery</h3>
                    <p>We'll send you a link to reset your password for your E-Shiksha account. Check your email after submitting.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScript Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.10.2/lottie.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBqsz_mDEHarA-_HzSZNfO9y3LMbf8HSio",
            authDomain: "education-58a96.firebaseapp.com",
            projectId: "education-58a96",
            storageBucket: "education-58a96.firebasestorage.app",
            messagingSenderId: "86814013646",
            appId: "1:86814013646:web:1613b7043c29b2f7b9389f",
            measurementId: "G-K2Z953CCYG"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const analytics = getAnalytics(app);

        // Forgot password form submission
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;

            try {
                // Show loading
                Swal.fire({
                    title: 'Sending reset link...',
                    text: 'Please wait',
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    willOpen: () => {
                        Swal.showLoading();
                    }
                });

                // Send password reset email
                await sendPasswordResetEmail(auth, email);

                // Success message
                Swal.fire({
                    icon: 'success',
                    title: 'Reset Link Sent!',
                    text: 'Please check your email for the password reset link.',
                    confirmButtonText: 'Back to Login',
                    confirmButtonColor: '#4F46E5'
                }).then(() => {
                    // Redirect to login page
                    window.location.href = 'login.html';
                });

            } catch (error) {
                // Error handling
                let errorMessage = 'Failed to send reset link. Please try again.';

                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email format.';
                }

                Swal.fire({
                    icon: 'error',
                    title: 'Reset Failed',
                    text: errorMessage
                });

                console.error('Password reset error:', error);
            }
        });
    </script>

    <!-- Custom JavaScript -->
    <script src="../js/auth.js"></script>
</body>
</html>
