<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - E-Shiksha</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/landing-assets/images/favicon.png">
    <!-- CSS Files -->
    <link rel="stylesheet" href="/landing-css/styles.css">
    <link rel="stylesheet" href="/landing-css/auth.css">

    <!-- Custom Toast Styles -->
    <style>
        /* Custom styles for SweetAlert2 toast notifications */
        .swal2-toast {
            background-color: #4F46E5 !important; /* Primary color from your theme */
            color: white !important;
        }
        .swal2-toast .swal2-title {
            color: white !important;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
        }
        .swal2-toast .swal2-icon.swal2-success .swal2-success-ring {
            border-color: rgba(255, 255, 255, 0.3);
        }
        .swal2-toast .swal2-icon.swal2-success [class^=swal2-success-line] {
            background-color: white;
        }
        .swal2-toast .swal2-timer-progress-bar {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loader Animation -->
    <div class="loader-container">
        <div class="loader"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="/">
                    <h1>E-<span>Shiksha</span></h1>
                </a>
            </div>
            <div class="menu-toggle">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/#about" class="nav-link">About</a></li>
                <li><a href="/#contact" class="nav-link">Contact Us</a></li>
                <li><a href="/pages/login.html" class="nav-link login-btn">Login</a></li>
                <li><a href="/pages/signup.html" class="nav-link signup-btn active">Sign Up</a></li>
            </ul>
            <div class="theme-toggle">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </nav>

    <!-- Signup Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-form-container">
                <div class="auth-form-header">
                    <h2>Create Account</h2>
                    <p>Join our community today</p>
                </div>
                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <input type="text" id="name" name="name" placeholder="Your Full Name" required>
                        <label for="name">Your Full Name</label>
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" name="email" placeholder="Your Email" required>
                        <label for="email">Your Email</label>
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="form-group">
                        <input type="tel" id="phone" name="phone" placeholder="Your Phone Number" required>
                        <label for="phone">Your Phone Number</label>
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" name="password" placeholder="Create Password" required>
                        <label for="password">Create Password</label>
                        <i class="fas fa-lock"></i>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                    <div class="form-group">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                        <label for="confirmPassword">Confirm Password</label>
                        <i class="fas fa-lock"></i>
                        <i class="fas fa-eye toggle-confirm-password"></i>
                    </div>
                    <div class="form-options">
                        <div class="terms-checkbox">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                        </div>
                    </div>
                    <button type="submit" class="btn primary-btn auth-btn">
                        <span>Create Account</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                <div class="auth-divider">
                    <span>OR</span>
                </div>
                <div class="social-auth">
                    <button class="social-auth-btn google-btn" disabled title="Initializing Google Sign-In...">
                        <i class="fab fa-google"></i>
                        <span>Continue with Google</span>
                    </button>
                </div>
                <div class="auth-redirect">
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>
            </div>
            <div class="auth-image">
                <div id="signup-lottie"></div>
                <div class="auth-image-text">
                    <h3>Join Our Community</h3>
                    <p>Create an account to access exclusive features and personalized content.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScript Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.10.2/lottie.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // Function to get client IP address
        async function getClientIP() {
            try {
                // Use a public API to get the client's IP address
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.error('Error getting client IP:', error);
                return null;
            }
        }

        // Fetch Firebase configuration from the server
        let firebaseConfig = {};

        // Function to fetch Firebase config
        async function fetchFirebaseConfig() {
            try {
                const response = await fetch('/api/firebase-auth/config');
                if (response.ok) {
                    firebaseConfig = await response.json();
                    console.log("Firebase config loaded successfully");

                    // Initialize Firebase with the fetched config
                    initializeFirebase();
                } else {
                    console.error("Failed to load Firebase config:", response.statusText);

                    // Fallback to development config
                    firebaseConfig = {
                        apiKey: "AIzaSyBqsz_mDEHarA-_HzSZNfO9y3LMbf8HSio",
                        authDomain: "education-58a96.firebaseapp.com",
                        projectId: "education-58a96",
                        storageBucket: "education-58a96.firebasestorage.app",
                        messagingSenderId: "86814013646",
                        appId: "1:86814013646:web:1613b7043c29b2f7b9389f",
                        measurementId: "G-K2Z953CCYG"
                    };

                    // Initialize Firebase with the fallback config
                    initializeFirebase();
                }
            } catch (error) {
                console.error("Error fetching Firebase config:", error);

                // Fallback to development config
                firebaseConfig = {
                    apiKey: "AIzaSyBqsz_mDEHarA-_HzSZNfO9y3LMbf8HSio",
                    authDomain: "education-58a96.firebaseapp.com",
                    projectId: "education-58a96",
                    storageBucket: "education-58a96.firebasestorage.app",
                    messagingSenderId: "86814013646",
                    appId: "1:86814013646:web:1613b7043c29b2f7b9389f",
                    measurementId: "G-K2Z953CCYG"
                };

                // Initialize Firebase with the fallback config
                initializeFirebase();
            }
        }

        // Fetch the Firebase config immediately
        fetchFirebaseConfig();

        // Variables to hold Firebase instances
        let app;
        let auth;
        let db;
        let analytics;
        let googleProvider;

        // Function to initialize Firebase
        function initializeFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                analytics = getAnalytics(app);
                googleProvider = new GoogleAuthProvider();

                // Enable Google sign-in
                document.querySelector('.google-btn').disabled = false;

                console.log("Firebase initialized successfully");
            } catch (error) {
                console.error("Error initializing Firebase:", error);

                // Disable Google sign-in if Firebase initialization fails
                document.querySelector('.google-btn').disabled = true;
                document.querySelector('.google-btn').title = "Google Sign-In is currently unavailable";
            }
        }

        // Signup form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'Passwords Do Not Match',
                    text: 'Please make sure your passwords match.'
                });
                return;
            }

            // Validate password strength
            if (password.length < 6) {
                Swal.fire({
                    icon: 'error',
                    title: 'Weak Password',
                    text: 'Password should be at least 6 characters long.'
                });
                return;
            }

            try {
                // Show loading spinner
                const loadingSwal = Swal.fire({
                    title: 'Creating your account...',
                    text: 'Please wait',
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    willOpen: () => {
                        Swal.showLoading();
                    }
                });

                try {
                    // First, create user in Firebase directly
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    console.log("User created in Firebase:", user.uid);

                    // Store additional user data in Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        name: name,
                        email: email,
                        phone: phone,
                        createdAt: new Date().toISOString()
                    });

                    console.log("User data stored in Firestore");

                    // Now store the user in MongoDB through our API
                    const clientIP = await getClientIP();

                    // Get Firebase ID token
                    const idToken = await user.getIdToken();

                    // Store user profile data in MongoDB (for profile only, not for authentication)
                    try {
                        // Store user profile data in MongoDB
                        fetch('/api/user/store-profile', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${idToken}`
                            },
                            body: JSON.stringify({
                                firebase_uid: user.uid,
                                email: email,
                                username: name,
                                display_name: name,
                                mobile_number: phone,
                                role: "student",
                                client_ip: clientIP
                            })
                        }).catch(err => {
                            // Just log the error but don't fail signup
                            console.warn('Failed to store profile data:', err);
                        });
                    } catch (profileError) {
                        console.error('Error storing profile data:', profileError);
                        // Don't fail signup if profile storage fails
                    }

                    // Close the loading spinner immediately
                    loadingSwal.close();

                    // Show toast notification for success
                    const Toast = Swal.mixin({
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 2000,
                        timerProgressBar: true,
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer)
                            toast.addEventListener('mouseleave', Swal.resumeTimer)
                        }
                    });

                    Toast.fire({
                        icon: 'success',
                        title: 'Signup Successful! Redirecting...'
                    });

                    // Redirect to app page after a short delay
                    setTimeout(() => {
                        window.location.href = '/app';
                    }, 2000);

                } catch (firestoreError) {
                    // If Firestore storage fails, still consider signup successful
                    // but log the error and notify the user
                    console.error('Error storing user data:', firestoreError);

                    // Close the loading spinner
                    loadingSwal.close();

                    // Show success with warning
                    Swal.fire({
                        icon: 'warning',
                        title: 'Account Created',
                        text: 'Your account was created, but we had trouble saving your profile details. You can update them later.',
                        timer: 3000,
                        showConfirmButton: true,
                        confirmButtonText: 'Go to Login'
                    }).then(() => {
                        window.location.href = '/app';
                    });
                }

            } catch (error) {
                // Error handling for Firebase Auth errors
                let errorMessage = 'Failed to create account. Please try again.';

                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Email is already in use. Please use a different email or login.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email format.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password is too weak. Please use a stronger password.';
                }

                // Close any existing loading spinner
                Swal.close();

                // Show error message
                Swal.fire({
                    icon: 'error',
                    title: 'Signup Failed',
                    text: errorMessage
                });

                console.error('Signup error:', error);
            }
        });

        // Google Sign Up
        document.querySelector('.google-btn').addEventListener('click', async () => {
            try {
                // Check if Firebase is initialized
                if (!auth || !googleProvider) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Firebase Not Initialized',
                        text: 'Google Sign-In is not available at the moment. Please try again later or use email/password signup.',
                    });
                    return;
                }

                // Show loading spinner
                const loadingSwal = Swal.fire({
                    title: 'Signing up with Google...',
                    text: 'Please wait',
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    willOpen: () => {
                        Swal.showLoading();
                    }
                });

                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                try {
                    // Store user data in Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        name: user.displayName || '',
                        email: user.email || '',
                        phone: user.phoneNumber || '',
                        createdAt: new Date().toISOString()
                    }, { merge: true });

                    // Store user profile data in MongoDB (for profile only, not for authentication)
                    try {
                        // Get Firebase ID token
                        const idToken = await user.getIdToken();

                        // Store user profile data in MongoDB
                        fetch('/api/user/store-profile', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${idToken}`
                            },
                            body: JSON.stringify({
                                firebase_uid: user.uid,
                                email: user.email,
                                username: user.displayName || user.email.split('@')[0],
                                display_name: user.displayName || user.email.split('@')[0],
                                mobile_number: user.phoneNumber || '',
                                role: "student",
                                client_ip: await getClientIP()
                            })
                        }).catch(err => {
                            // Just log the error but don't fail signup
                            console.warn('Failed to store Google profile data:', err);
                        });
                    } catch (profileError) {
                        console.error('Error storing Google profile data:', profileError);
                        // Don't fail signup if profile storage fails
                    }

                    // Close the loading spinner immediately
                    loadingSwal.close();

                    // Show toast notification for success
                    const Toast = Swal.mixin({
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 2000,
                        timerProgressBar: true,
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer)
                            toast.addEventListener('mouseleave', Swal.resumeTimer)
                        }
                    });

                    Toast.fire({
                        icon: 'success',
                        title: 'Google Signup Successful! Redirecting...'
                    });

                    // Redirect to app page after a short delay
                    setTimeout(() => {
                        window.location.href = '/app';
                    }, 2000);

                } catch (firestoreError) {
                    // If Firestore storage fails, still consider signup successful
                    console.error('Error storing Google user data:', firestoreError);

                    // Close the loading spinner
                    loadingSwal.close();

                    // Show success with warning
                    Swal.fire({
                        icon: 'warning',
                        title: 'Account Created',
                        text: 'Your Google account was connected, but we had trouble saving your profile details. You can update them later.',
                        timer: 3000,
                        showConfirmButton: true,
                        confirmButtonText: 'Go to Login'
                    }).then(() => {
                        window.location.href = '/app';
                    });
                }
            } catch (error) {
                // Close any existing loading spinner
                Swal.close();

                console.error('Google sign up error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Google Sign Up Failed',
                    text: 'Failed to sign up with Google. Please try again.'
                });
            }
        });



        // Toggle password visibility
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Toggle confirm password visibility
        document.querySelector('.toggle-confirm-password').addEventListener('click', function() {
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>

    <!-- Custom JavaScript -->
    <script src="/landing-js/auth.js"></script>
</body>
</html>
